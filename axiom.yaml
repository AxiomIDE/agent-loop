name: axiom-official/agent-loop
version: 0.2.0
language: python
description: |
    Agent-tool-loop demo package (knowledge/vision/agent-tool-loop-flow-pattern.md,
    built incrementally per backlog/agent-tool-loop/PLAN.md).

    A single shared AgentMessage flows through a scripted reasoner (LLMDriver),
    mock tools, and a terminal (FlowComplete). The demo grows across slices:
    slice 2 is the simplest back-edge loop — LLMDriver dispatches one fixed
    tool (ToolEcho) per turn and terminates after a scripted turn budget.
    Later slices add fan-out + JoinPassthrough, dynamic AddTool, and per-turn
    join/compose reconfiguration.
author: Axiom Official
license: MIT
tags:
    - demo
    - agent-tool-loop
    - mutation
    - agentic
nodes:
    - name: LLMDriver
      description: |
        Scripted deterministic reasoner. Increments the turn counter and sets
        AgentMessage.status ("continue" → dispatch a tool and loop; "done" →
        terminate). Reads its plan from the goal string (e.g. "turns=3"). Not
        mutation_capable — it only decides.
      input: AgentMessage
      output: AgentMessage
    - name: ToolEcho
      description: |
        Mock tool. Appends "tool#<iteration>" to the shared context and loops
        the message back to LLMDriver via the seed flow's loop edge.
      input: AgentMessage
      output: AgentMessage
    - name: FlowComplete
      description: |
        Terminal node. LLMDriver routes here on status=="done". Passes the
        accumulated AgentMessage through so the loop transcript is the flow's
        final output.
      input: AgentMessage
      output: AgentMessage
    - name: ToolA
      description: |
        Mock fan-out tool (slice 3). Appends "A#<iteration>" to the shared
        context and passes through. Dispatched when "ToolA" is in tools.
      input: AgentMessage
      output: AgentMessage
    - name: ToolB
      description: |
        Second mock fan-out tool (slice 3), parallel sibling of ToolA. Its
        arrival is required by JoinPassthrough's JOIN_AND, so the flow only
        completes if ToolB also fired this turn.
      input: AgentMessage
      output: AgentMessage
    - name: JoinPassthrough
      description: |
        Fan-in merge node (slice 3). A JOIN_AND consumer over the fired tool
        edges; a static ADR-045 compose_plan assembles its AgentMessage input
        from an incident edge so the loop stays typed. Appends "join#<iteration>"
        and passes through.
      input: AgentMessage
      output: AgentMessage
    - name: ReflectionProbe
      description: |
        Slice 5 / GAP-4 witness. Reads ax.reflection.flow.edges and surfaces
        each conditional edge's condition summary (field/op/operands) into
        context — proving reflection now exposes the dispatch operand for
        idempotent AddTool decisions.
      input: AgentMessage
      output: AgentMessage
